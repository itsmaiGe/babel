name: Build installers

# Builds, in the cloud:
#   - macOS:   Babel Manager.dmg (Cocoa GUI)
#   - Windows: Babel-Installer.exe (Go + giu GUI)
# On a tag push (vX.Y.Z) it also publishes a GitHub Release with both artifacts.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: babel-mac
          path: dist/Babel Manager.dmg
          if-no-files-found: error

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Prepare embedded payload
        run: node scripts/prepare-installer-payload.js
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Resolve Go deps
        working-directory: installer
        run: go mod tidy
      - name: Test install logic
        working-directory: installer
        run: go test ./internal/...
      - name: Embed exe icon
        working-directory: installer
        run: go run github.com/akavel/rsrc@latest -ico babel.ico -o rsrc.syso
      - name: Build exe
        working-directory: installer
        env:
          CGO_ENABLED: "1"
        run: |
          New-Item -ItemType Directory -Force -Path ..\dist | Out-Null
          go build -ldflags "-H windowsgui -s -w" -o ..\dist\Babel-Installer.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: babel-windows-exe
          path: dist/Babel-Installer.exe
          if-no-files-found: error

  release:
    needs: [build-mac, build-windows-exe]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "artifacts/babel-windows-exe/Babel-Installer.exe" \
            "artifacts/babel-mac/Babel Manager.dmg" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Babel ${GITHUB_REF_NAME}" \
            --notes "Windows：下载 Babel-Installer.exe，双击运行后点「安装」。macOS：下载 Babel Manager.dmg，打开后运行 Babel Manager 点 Install。安装后请彻底退出 Discord（托盘 > 退出 Discord）再重新打开。"
